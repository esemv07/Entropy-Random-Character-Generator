<!DOCTYPE html>
<html>
    <head>
        <title>Random Character Generator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h2>Strengths</h2>
        <div class="options-container">
             <div class="option-card">
                <h3>adventurous<br>ambitiou<br>approachable<br>calm<br>compassionate<br>confident<br>courageous</h3>
            </div>
            <div class="option-card">
                <h3>dependable<br>easygoing<br>enthusiastic<br>fearless<br>focused<br>generous<br>hard working</h3>

            <div class="option-card">
                <h3>intelligent<br>knowledgeable<br>lovable<br>loyal<br>noble<br>polite<br>resilient</h3>
