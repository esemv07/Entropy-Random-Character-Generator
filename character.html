<!DOCTYPE html>
<html>
    <head>
        <title>Random Character Generator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h2>Final Character</h2>
        <div class="character-container">
             <div class="result-card">
                <h3>~ Expression ~</h3>
                <br>
                <p id="expression"></p>
                <div class="img-container">
                    <img class="layer-head" id="head">
                    <img class="layer-skin" id="skin">
                    <img class="layer-hair" id="hair">
                    <img class="layer-eyes" id="eyes">
                </div>
            </div>
            <div class="result-card">
                <h3>~ Birthday ~</h3>
                <p id="birthday"></p>
            </div>
            <div class="result-card">
                <h3>~ Height ~</h3>
                <p id="height"></p>
            </div>
            <div class="result-card">
                <h3>~ Strengths and Weaknesses ~</h3>
                <p id="strengthsAndWeaknesses"></p>
            </div>
            <div class="result-card">
                <h3>~ Fears ~</h3>
                <p id="fears"></p>
            </div>
            <div class="result-card">
                <h3>~ Likes and Dislikes ~</h3>
                <p id="likesAndDislikes"></p>
            </div>
        </div>
        <a href="index.html">
            <button onclick="restart()">Restart</button>
        </a>

        <script src="script.js"></script>
    </body>
</html>
