<!DOCTYPE html>
<html>
    <head>
        <title>Random Character Generator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h2>Weaknesses</h2>
        <div class="options-container">
             <div class="option-card">
                <h3>angry<br>arrogant<br>careless<br>clumsy<br>cowardly<br>disloyal<br>dramatic</h3>
            </div>
            <div class="option-card">
                <h3>egotistic<br>envious<br>forgetful<br>gives up easily<br>greedy<br>heartless<br>hot headed</h3>
            </div>
            <div class="option-card">
                <h3>impatient<br>indecisive<br>irresponsible<br>lazy<br>naive<br>over-confident<br>reckless</h3>
            </div>
            <div class="option-card">
                <h3>rude<br>selfish<br>thoughtless<br>uncommitted<br>uncoordinated<br>unfriendly</h3>
            </div>
        </div>
        <button id="picker" onclick=pickItems(weaknesses,3)>Pick Weaknesses</button>
        <br>
        <div class="results-container hidden" id="resultsContainer">
            <h4>Result: </h4>
            <p id="results"></p>
        </div>
        <a href="birthday.html" class="hidden" id="next">
            <button>Next</button>
        </a>
        <br>

        <script src="script.js"></script>
    </body>
</html>
